      <div class="titulo">
        <h1 id="tituloC">Cadastre seu evento</h1>

      <form id="form" autocomplete="off" method="post">
        <fieldset class="grupo">
          <div class="form-grid">
            <div class="input-box">
              <label for="nome">Nome do Evento:</label>
              <input
                type="text"
                id="evento"
                name="evento"
                placeholder="Digite o nome do evento"
                required
              />
              <span class="error" id="evento-error"></span>
            </div>           

            <div class="input-box">
              <label for="link-ingresso">Link para a compra do ingresso:</label>
              <input
                type="link-ingresso"
                id="link-ingresso"
                name="link-ingresso"
                placeholder="Digite o link do evento"
                required
              />
              <span class="error" id="link-error"></span>
            </div>

            <div class="linha-dupla">
              <div class="input-box">
                <label for="data">Datas do evento:</label>
                <input
                  type="text"
                  id="data"
                  name="data"
                  placeholder="Digite uma ou mais datas do evento"
                  required
                />
                <span class="error" id="cpf-error"></span>
              </div>
            </div>           

            <div class="linha-dupla">
              <div class="input-box">
                <label for="hora">Horário:</label>
                <input
                  type="text"
                  id="hora"
                  name="hora"
                  placeholder="Digite o horario de início e fim do evento"
                  required
                />
                <span class="error" id="hora-error"></span>
              </div>
            </div>


            <div class="input-box">
                <label for="descricao">Descrição do evento:</label>
                <textarea
                    id="descricao"
                    name="descricao"
                    placeholder="Digite sa descrição do evento"
                    rows="4"
                    required
                ></textarea>
                <span class="error" id="mensagem-error"></span>
            </div>
            
        </fieldset>
      </form>

    <script>
      const backToTopButton = document.getElementById("back-to-top");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          backToTopButton.style.display = "block";
        } else {
          backToTopButton.style.display = "none";
        }
      });

      backToTopButton.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>

    <script>
      // funcionalide de togglar pro tema
      const themeToggle = document.getElementById('theme-toggle');
      const body = document.body;

      // carregar o tema salvo no f5
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        body.classList.add('light-theme');
      }

      // togglar o tema no click
      themeToggle.addEventListener('click', () => {
        body.classList.toggle('light-theme');
        const currentTheme = body.classList.contains('light-theme') ? 'light' : 'dark';
        localStorage.setItem('theme', currentTheme);
      });
    </script>

    <script>
      // funcionalidade do menu hamburger
      const menuToggle = document.getElementById("menu-toggle");
      const menu = document.querySelector(".menu");

      menuToggle.addEventListener("click", () => {
        menu.classList.toggle("active");
      });
    </script>
