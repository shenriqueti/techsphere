<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Validação de Segurança - TechSphere</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <div class="container">
      <header class="container-cabecalho">
        <div class="container-logo">
          <a href="index.html"><div class="logo">TS</div></a>
          <div class="conteudo-logo">
            <div class="titulo-logo">TechSphere</div>
            <p class="texto-logo">Festival de Inovação & Tecnologia</p>
          </div>
        </div>

        <nav class="menu">
          <a href="index.html">Home</a>
          <a href="login.html">Login</a>
          <a href="cadastro.html">Cadastre-se</a>
          <a href="#contato">Contato</a>
          <button id="theme-toggle" aria-label="Alterar tema">
            <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
          </button>
        </nav>

        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>

      <div class="titulo">
        <h1>Validação de Segurança</h1>
      </div>

      <form id="2faForm" autocomplete="off">
        <fieldset class="grupo">
          <div class="input-group" style="text-align: center;">
            <p style="color: var(--cor-texto-secundario); margin-bottom: 1.5rem; font-size: 1.1rem;">
              Segundo Fator de Autenticação (2FA)
            </p>

            <div class="input-box" style="max-width: 400px; margin: 0 auto;">
              <label for="cep">Qual o CEP cadastrado na sua conta?</label><br />
              <input
                type="text"
                id="cep"
                name="cep"
                placeholder="Digite seu CEP (ex: 12345678)"
                required
              /><br /><br />
            </div>

            <p style="color: red; font-weight: bold; margin-bottom: 1.5rem;">
              Tentativas restantes: 3
            </p>

            <div class="input-box" style="max-width: 400px; margin: 0 auto;">
              <input type="button" id="confirmBtn" value="Confirmar" />
            </div>

            <div style="text-align: center; margin-top: 1rem">
              <a
                href="login.html"
                style="color: var(--cor-neon-azul); text-decoration: none"
                >Voltar para o Login</a
              >
            </div>
          </div>
        </fieldset>
      </form>

      <button id="back-to-top" title="Voltar ao topo">↑</button>

      <footer class="footer" id="contato">
        <div class="container">
          <div class="patrocinadores-master">
            <h3 class="Titulo">Patrocinador Master</h3>
            <a href="https://www.itau.com.br/" target="_blank"
              ><img src="images/itau-10.png" alt="Logo do Itaú"
            /></a>
          </div>

          <div class="patrocinadores">
            <h3 class="Titulo">Patrocinadores</h3>
            <div class="logos-grid">
              <div class="logos">
                <a href="https://www.apple.com/br/store" target="_blank"
                  ><img src="images/applebranca.png" alt="Logo Apple"
                /></a>
              </div>
              <div class="logos">
                <a href="https://www.coca-cola.com/br/pt" target="_blank"
                  ><img src="images/coca-cola-1.png" alt="Logo Coca-Cola"
                /></a>
              </div>
              <div class="logos">
                <a
                  href="https://about.google/intl/pt_ALL/company-info/"
                  target="_blank"
                  ><img src="images/google-logo-about.svg" alt="Logo Google"
                /></a>
              </div>
              <div class="logos">
                <a href="https://www.redbull.com/br-pt" target="_blank"
                  ><img
                    src="images/redbullcom-logo_double-with-text.svg"
                    alt="Logo Red Bull"
                /></a>
              </div>
              <div class="logos">
                <a href="https://www.unisuam.edu.br/" target="_blank"
                  ><img src="images/unisuam.png" alt="Logo Unisuam"
                /></a>
              </div>
              <div class="logos">
                <a href="https://www.tim.com.br/rj" target="_blank"
                  ><img src="images/tim.svg" alt="Logo Tim"
                /></a>
              </div>
            </div>
          </div>

          <div class="social-icons">
            <a
              href="https://www.instagram.com/unisuam/"
              target="_blank"
              aria-label="Visite nosso Instagram"
              ><i class="fab fa-instagram"></i
            ></a>
            <a
              href="https://www.facebook.com/UNISUAM/?locale=pt_BR"
              target="_blank"
              aria-label="Visite nosso Facebook"
              ><i class="fab fa-facebook"></i
            ></a>
            <a
              href="https://x.com/unisuam_mais"
              target="_blank"
              aria-label="Visite nosso Twitter"
              ><i class="fab fa-twitter"></i
            ></a>
          </div>
          <p>
            &copy; 2025 TechSphere, conectando o futuro da tecnologia no Brasil
          </p>
        </div>
      </footer>
    </div>

    <script>
      const backToTopButton = document.getElementById("back-to-top");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          backToTopButton.style.display = "block";
        } else {
          backToTopButton.style.display = "none";
        }
      });

      backToTopButton.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>

    <script>
      // funcionalide de togglar pro tema
      const themeToggle = document.getElementById("theme-toggle");
      const body = document.body;

      // carregar o tema salvo no f5
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") {
        body.classList.add("light-theme");
      }

      // togglar o tema no click
      themeToggle.addEventListener("click", () => {
        body.classList.toggle("light-theme");
        const currentTheme = body.classList.contains("light-theme")
          ? "light"
          : "dark";
        localStorage.setItem("theme", currentTheme);
      });
    </script>

    <script>
      // funcionalidade do menu hamburger
      const menuToggle = document.getElementById("menu-toggle");
      const menu = document.querySelector(".menu");

      menuToggle.addEventListener("click", () => {
        menu.classList.toggle("active");
      });
    </script>
  </body>
</html>
